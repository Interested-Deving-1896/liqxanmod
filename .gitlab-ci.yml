# Converted from GitHub Actions — liqxanmod
# Mirrors: build.yml, gen-arch-config.yml

stages:
  - generate
  - build
  - release

default:
  image: debian:bookworm

.build-deps: &build-deps
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        ca-certificates build-essential bc bison flex libssl-dev libelf-dev
        libncurses-dev dwarves pahole cpio zstd lz4 git wget curl

# ── Generate arch configs ─────────────────────────────────────────────────────
gen-arch-config:
  stage: generate
  <<: *build-deps
  script:
    - bash scripts/gen-arch-config.sh || true
  artifacts:
    paths: [configs/]
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [scripts/gen-arch-config.sh, configs/**/*]

# ── Build kernel ──────────────────────────────────────────────────────────────
build:x86-64:
  stage: build
  <<: *build-deps
  script:
    - bash scripts/build.sh x86_64 || true
  artifacts:
    paths: ["*.deb", "*.rpm"]
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── GitLab Release ────────────────────────────────────────────────────────────
gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build:x86-64]
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'liqxanmod $CI_COMMIT_TAG'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
